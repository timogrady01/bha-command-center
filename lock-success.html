<!DOCTYPE html>
<html>
<head>
    <title>ROTATION STOPPED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --matrix-green: #00FF41; --danger-red: #FF3131; --bg-black: #0A0A0A; }
        body { background: var(--bg-black); color: white; font-family: 'Inter', sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
        .lock-container { border: 2px solid var(--danger-red); border-radius: 12px; padding: 30px; max-width: 400px; margin: auto; background: #111; }
        h1 { color: var(--danger-red); font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 5px; }
        .stk-badge { color: var(--matrix-green); font-size: 1.4rem; font-weight: bold; margin: 20px 0; background: #222; padding: 10px; border-radius: 5px; display: inline-block; }
        .instruction { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        .call-btn { display: block; background: var(--matrix-green); color: black; padding: 18px; border-radius: 8px; text-decoration: none; font-weight: 900; font-size: 1.1rem; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="lock-container">
        <h1>🛑 ROTATION STOPPED</h1>
        <div class="stk-badge">STK# <span id="stock-num">PROCESSING...</span></div>
        <p class="instruction">This Houston 130 unit has been removed from the sequential chain. No other Buying Dealers can view this unit.</p>
        <a href="tel:7135550123" class="call-btn">📞 CALL HOUSTON HUB</a>
    </div>

    <script type="module">
      import { createClient } from 'https://jspm.dev'

      // Replace these with your actual Supabase URL and Key
      const supabase = createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_KEY')

      async function lockUnit() {
        const urlParams = new URLSearchParams(window.location.search);
        const stockNum = urlParams.get('stk'); 

        if (stockNum) {
          const { error } = await supabase
            .from('inventory')
            .update({ status: 'LOCKED', rotation_active: false })
            .eq('stock_number', stockNum);

          if (error) {
            console.error('Lock Failed:', error);
            document.getElementById('stock-num').innerText = "ERROR";
          } else {
            document.getElementById('stock-num').innerText = stockNum;
          }
        } else {
            document.getElementById('stock-num').innerText = "NO STK# PROVIDED";
        }
      }

      lockUnit();
    </script>
</body>
</html>
